# Catan CLI Themes Configuration
# Set active to 'text', 'emoji', or 'classic'
active: text

# Global character mapping (Word -> Character/Emoji)
characters:
  # Resource Icons
  PINE_TREE: "🌲"
  BRICKS: "🧱"
  SHEEP_ICON: "🐑"
  WHEAT_ICON: "🌾"
  MOUNTAIN: "🏔"
  DESERT_ICON: "🏜"
  LOG: "🪵"
  RAM: "🐏"
  SHEAF: "🌾"
  PICKAXE: "⛏"
  CACTUS: "🌵"
  
  # Board Icons
  SAILBOAT: "⛵"
  ANCHOR: "⚓"
  DOT: "●"
  HOUSE: "🏠"
  SQUARE: "■"
  CASTLE: "🏰"
  PERSON: "👤"
  ROBBER_ICON: "🕵️"
  
  # UI Icons
  PLAY_ICON: "▶️"
  PAUSE_ICON: "⏸️"
  SWORDS: "⚔️"
  ROAD_ICON: "🛣️"
  CURSOR_ICON: "▶"

themes:
  text:
    resources:
      wood: "W"
      brick: "B"
      sheep: "s"
      wheat: "w"
      ore: "O"
      desert: "D"
    colors:
      wood: "#795548"
      brick: "#c62828"
      sheep: "#9ccc65"
      wheat: "#fbc02d"
      ore: "#78909c"
      desert: "#555555"
    board:
      port: "S"
      settlement: "o"
      city: "H"
      robber: "X"
    ui:
      playing: ">>"
      paused: "||"
      largest_army: "[A]"
      longest_road: "[R]"
      player_cursor: ">>"
    widths:
      "W": 1
      "B": 1
      "s": 1
      "w": 1
      "O": 1
      "D": 1
      "o": 1
      "H": 1
      "X": 1
      "S": 1
      ">>": 2
      "||": 2
      "[A]": 3
      "[R]": 3

  emoji:
